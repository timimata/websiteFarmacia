[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_SITE_URL = "https://www.farmaciaascensaonunes.pt"

# SPA routing — redirect all paths to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers (OWASP best practices)
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"
    # Control referrer information
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Restrict browser features + opt out of FLoC/Topics
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), interest-cohort=()"
    # Legacy XSS protection for older browsers
    X-XSS-Protection = "1; mode=block"
    # Enforce HTTPS (HSTS) — 1 year, include subdomains, allow preload
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Content Security Policy — restrict resource origins + Trusted Types for DOM XSS prevention
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://images.unsplash.com https://lh3.googleusercontent.com; font-src 'self' data:; frame-src https://www.google.com/maps/; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests; require-trusted-types-for 'script';"
    # Prevent DNS prefetching to external domains
    X-DNS-Prefetch-Control = "off"
    # Cross-Origin isolation headers (Spectre attack mitigation)
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"

# Prevent caching of HTML (may contain session-specific content)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0"
    Pragma = "no-cache"

# Cache static assets (hashed filenames = safe to cache forever)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
