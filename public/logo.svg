<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="cross">
      <path d="M60,0 H140 V60 H200 V140 H140 V200 H60 V140 H0 V60 H60 Z"/>
    </clipPath>
  </defs>
  <!-- Cross shape with two-tone green -->
  <g clip-path="url(#cross)">
    <!-- Light green (top-left half) -->
    <path d="M0,0 L200,0 L0,200 Z" fill="#4DB377"/>
    <!-- Dark green (bottom-right half) -->
    <path d="M200,0 L200,200 L0,200 Z" fill="#006B3F"/>
    <!-- White arc separator -->
    <path d="M0,200 Q80,100 200,0" stroke="white" stroke-width="12" fill="none" stroke-linecap="round"/>
  </g>
</svg>
